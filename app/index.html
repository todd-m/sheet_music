<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sheet Music Library</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.min.mjs" type="module"></script>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface2: #0f3460;
    --accent: #e94560;
    --text: #eee;
    --text-dim: #999;
    --radius: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* -- Header / Search -- */
  header {
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--surface2);
    flex-shrink: 0;
    max-height: 200px;
    transition: max-height 0.3s ease, padding 0.3s ease, opacity 0.3s ease;
  }
  header h1 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 12px;
    color: var(--accent);
  }
  #search {
    width: 100%;
    max-width: 600px;
    padding: 10px 16px;
    font-size: 16px;
    border: 1px solid var(--surface2);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--text-dim); }
  #result-count {
    display: inline-block;
    margin-left: 12px;
    font-size: 13px;
    color: var(--text-dim);
  }

  /* -- Main layout -- */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* -- Results panel -- */
  .results-panel {
    width: 420px;
    min-width: 300px;
    overflow-y: auto;
    border-right: 1px solid var(--surface2);
    background: var(--surface);
    flex-shrink: 0;
    transition: width 0.3s ease, min-width 0.3s ease;
  }
  .result-item {
    padding: 12px 20px;
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.15s;
  }
  .result-item:hover { background: var(--surface2); }
  .result-item.active { background: var(--surface2); border-left: 3px solid var(--accent); }
  .result-title {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 3px;
    line-height: 1.3;
  }
  .result-title mark {
    background: rgba(233, 69, 96, 0.3);
    color: var(--text);
    border-radius: 2px;
    padding: 0 1px;
  }
  .result-meta {
    font-size: 12px;
    color: var(--text-dim);
  }
  .result-meta .volume-name { color: #7faadb; }
  .no-results {
    padding: 40px 20px;
    text-align: center;
    color: var(--text-dim);
    font-size: 14px;
  }

  /* -- Viewer panel -- */
  .viewer-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #111;
    position: relative;
  }
  .viewer-toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--surface2);
    font-size: 13px;
    flex-shrink: 0;
  }
  .viewer-toolbar button {
    background: var(--surface2);
    color: var(--text);
    border: none;
    padding: 6px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 13px;
  }
  .viewer-toolbar button:hover { background: var(--accent); }
  .viewer-toolbar button:disabled { opacity: 0.3; cursor: default; }
  .page-info { color: var(--text-dim); }
  .page-info .book-page { color: #7faadb; }
  #viewer-canvas-container {
    flex: 1;
    overflow: auto;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 16px;
  }
  #viewer-canvas-container canvas {
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    max-width: 100%;
  }
  .viewer-empty {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-size: 15px;
  }

  /* -- Fullscreen mode -- */
  body.fullscreen header {
    max-height: 0;
    padding: 0 24px;
    opacity: 0;
    overflow: hidden;
    pointer-events: none;
    border-bottom: none;
  }
  body.fullscreen .results-panel {
    width: 64px;
    min-width: 64px;
  }
  body.fullscreen .results-panel .result-item { display: none; }
  body.fullscreen .results-panel .no-results  { display: none; }

  .fs-search-icon {
    display: none;
    width: 100%;
    padding: 14px 0;
    text-align: center;
    cursor: pointer;
    color: var(--text-dim);
    border-bottom: 1px solid var(--surface2);
    transition: color 0.2s;
  }
  .fs-search-icon:hover { color: var(--accent); }
  body.fullscreen .fs-search-icon { display: block; }

  .fs-tiles {
    display: none;
    flex-direction: column;
    overflow-y: auto;
    gap: 4px;
    padding: 4px;
  }
  body.fullscreen .fs-tiles { display: flex; }

  .fs-tile {
    width: 56px;
    height: 56px;
    background: var(--surface2);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: 10px;
    line-height: 1.2;
    color: var(--text);
    cursor: pointer;
    padding: 4px;
    word-break: break-word;
    overflow: hidden;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .fs-tile:hover { background: var(--accent); }
  .fs-tile.active {
    background: var(--accent);
    box-shadow: inset 0 0 0 2px rgba(255,255,255,0.3);
  }

  .btn-fullscreen { margin-left: auto; }
</style>
</head>
<body>

<header>
  <h1>Sheet Music Library</h1>
  <div style="display:flex;align-items:center;">
    <input type="text" id="search" placeholder="Search songs..." autofocus>
    <span id="result-count"></span>
  </div>
</header>

<div class="main">
  <div class="results-panel" id="results-panel">
    <div class="fs-search-icon" id="fs-search-icon" title="Exit fullscreen / Search">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </div>
    <div class="fs-tiles" id="fs-tiles"></div>
    <div class="no-results" id="empty-state">Type to search your library</div>
  </div>
  <div class="viewer-panel" id="viewer-panel">
    <div class="viewer-empty" id="viewer-empty">Select a song to view</div>
  </div>
</div>

<script type="module">
  // ── pdf.js setup ──
  const pdfjsLib = await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.min.mjs');
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.worker.min.mjs';

  // ── State ──
  let catalog = { volumes: {}, songs: [] };
  let currentPdf = null;        // { doc, driveFileId }
  let currentPageNum = 1;
  let currentZoom = 1.5;
  let activeResult = null;
  let isFullscreen = false;

  // ── Load catalog ──
  async function loadCatalog() {
    try {
      const resp = await fetch('/api/catalog');
      catalog = await resp.json();
    } catch (e) {
      console.error('Failed to load catalog:', e);
    }
  }

  // ── Fuzzy search ──
  function searchSongs(query) {
    if (!query.trim()) return [];
    const terms = query.toLowerCase().split(/\s+/);
    const scored = [];
    for (const song of catalog.songs) {
      const titleLower = song.title.toLowerCase();
      let match = true;
      let score = 0;
      for (const term of terms) {
        const idx = titleLower.indexOf(term);
        if (idx === -1) { match = false; break; }
        // Boost for starts-with and exact position
        if (idx === 0) score += 10;
        score += (1 / (idx + 1));
      }
      if (match) {
        scored.push({ song, score });
      }
    }
    scored.sort((a, b) => b.score - a.score || a.song.title.localeCompare(b.song.title));
    return scored.map(s => s.song);
  }

  function highlightMatch(title, query) {
    if (!query.trim()) return escapeHtml(title);
    const terms = query.toLowerCase().split(/\s+/).filter(Boolean);
    let result = escapeHtml(title);
    for (const term of terms) {
      const regex = new RegExp(`(${escapeRegex(term)})`, 'gi');
      result = result.replace(regex, '<mark>$1</mark>');
    }
    return result;
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function escapeRegex(s) {
    return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }

  // ── Render results ──
  const resultsPanel = document.getElementById('results-panel');
  const emptyState = document.getElementById('empty-state');
  const resultCount = document.getElementById('result-count');
  const searchInput = document.getElementById('search');

  function renderResults(songs, query) {
    // Clear previous results but keep empty-state element
    resultsPanel.querySelectorAll('.result-item').forEach(el => el.remove());

    if (!query.trim()) {
      emptyState.style.display = '';
      emptyState.textContent = 'Type to search your library';
      resultCount.textContent = `${catalog.songs.length} songs indexed`;
      return;
    }
    if (songs.length === 0) {
      emptyState.style.display = '';
      emptyState.textContent = 'No matching songs';
      resultCount.textContent = '';
      return;
    }

    emptyState.style.display = 'none';
    resultCount.textContent = `${songs.length} result${songs.length === 1 ? '' : 's'}`;

    for (const song of songs) {
      const vol = catalog.volumes[song.volumeId] || {};
      const div = document.createElement('div');
      div.className = 'result-item';
      div.innerHTML = `
        <div class="result-title">${highlightMatch(song.title, query)}</div>
        <div class="result-meta">
          <span class="volume-name">${escapeHtml(vol.name || song.volumeId)}</span>
          &middot; p. ${song.nominalPage}
          ${song.composer ? ' &middot; ' + escapeHtml(song.composer) : ''}
        </div>
      `;
      div.addEventListener('click', () => openSong(song, div));
      resultsPanel.appendChild(div);
    }

    if (isFullscreen) buildTiles();
  }

  // ── Open a song in the viewer ──
  async function openSong(song, el) {
    // Mark active
    if (activeResult) activeResult.classList.remove('active');
    el.classList.add('active');
    activeResult = el;

    const vol = catalog.volumes[song.volumeId] || {};
    const driveFileId = vol.driveFileId;
    const offset = vol.pageOffset || 0;
    const targetPage = song.nominalPage + offset;

    if (!driveFileId) {
      showViewerError(`No Drive file ID configured for volume "${vol.name || song.volumeId}"`);
      return;
    }

    showViewer(song, vol);

    // Load PDF if different from current
    if (!currentPdf || currentPdf.driveFileId !== driveFileId) {
      try {
        let pdfUrl = `/api/pdf/${driveFileId}`;
        if (vol.resourceKey) pdfUrl += `?resourcekey=${encodeURIComponent(vol.resourceKey)}`;
        const loadingTask = pdfjsLib.getDocument(pdfUrl);
        const doc = await loadingTask.promise;
        currentPdf = { doc, driveFileId };
      } catch (e) {
        showViewerError(`Failed to load PDF: ${e.message}`);
        return;
      }
    }

    const clampedPage = Math.max(1, Math.min(targetPage, currentPdf.doc.numPages));
    await renderPage(clampedPage, song, vol);
  }

  // ── Viewer UI ──
  const viewerPanel = document.getElementById('viewer-panel');
  const viewerEmpty = document.getElementById('viewer-empty');
  let viewerSong = null;
  let viewerVol = null;

  function showViewer(song, vol) {
    viewerSong = song;
    viewerVol = vol;
    viewerPanel.innerHTML = `
      <div class="viewer-toolbar">
        <button id="btn-prev" title="Previous page">&larr; Prev</button>
        <button id="btn-next" title="Next page">Next &rarr;</button>
        <button id="btn-zoom-out" title="Zoom out">&minus;</button>
        <button id="btn-zoom-in" title="Zoom in">+</button>
        <span class="page-info" id="page-info"></span>
        <button id="btn-fullscreen" class="btn-fullscreen" title="Toggle fullscreen">${isFullscreen ? 'Exit' : 'Focus'}</button>
      </div>
      <div id="viewer-canvas-container"><canvas id="pdf-canvas"></canvas></div>
    `;
    document.getElementById('btn-prev').addEventListener('click', () => navigatePage(-1));
    document.getElementById('btn-next').addEventListener('click', () => navigatePage(1));
    document.getElementById('btn-zoom-out').addEventListener('click', () => zoom(-0.25));
    document.getElementById('btn-zoom-in').addEventListener('click', () => zoom(0.25));
    document.getElementById('btn-fullscreen').addEventListener('click', () => toggleFullscreen());
  }

  function showViewerError(msg) {
    viewerPanel.innerHTML = `<div class="viewer-empty">${escapeHtml(msg)}</div>`;
  }

  async function renderPage(pageNum, song, vol) {
    if (!currentPdf) return;
    currentPageNum = pageNum;
    const page = await currentPdf.doc.getPage(pageNum);
    const viewport = page.getViewport({ scale: currentZoom });
    const canvas = document.getElementById('pdf-canvas');
    if (!canvas) return;
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    const ctx = canvas.getContext('2d');
    await page.render({ canvasContext: ctx, viewport }).promise;

    const offset = (vol || viewerVol || {}).pageOffset || 0;
    const bookPage = pageNum - offset;
    const info = document.getElementById('page-info');
    if (info) {
      info.innerHTML = `PDF page ${pageNum} / ${currentPdf.doc.numPages}
        &nbsp;&middot;&nbsp; <span class="book-page">Book page ${bookPage}</span>`;
    }

    document.getElementById('btn-prev').disabled = (pageNum <= 1);
    document.getElementById('btn-next').disabled = (pageNum >= currentPdf.doc.numPages);
  }

  function navigatePage(delta) {
    const newPage = currentPageNum + delta;
    if (currentPdf && newPage >= 1 && newPage <= currentPdf.doc.numPages) {
      renderPage(newPage, viewerSong, viewerVol);
    }
  }

  function zoom(delta) {
    currentZoom = Math.max(0.5, Math.min(4, currentZoom + delta));
    if (currentPdf) renderPage(currentPageNum, viewerSong, viewerVol);
  }

  // ── Fullscreen mode ──
  function toggleFullscreen(force) {
    isFullscreen = (force !== undefined) ? force : !isFullscreen;
    document.body.classList.toggle('fullscreen', isFullscreen);
    if (isFullscreen) buildTiles();
    const btn = document.getElementById('btn-fullscreen');
    if (btn) btn.textContent = isFullscreen ? 'Exit' : 'Focus';
  }

  function buildTiles() {
    const container = document.getElementById('fs-tiles');
    container.innerHTML = '';
    const items = resultsPanel.querySelectorAll('.result-item');
    items.forEach(item => {
      const title = item.querySelector('.result-title')?.textContent || '?';
      const shortLabel = title.substring(0, 6).trim();
      const tile = document.createElement('div');
      tile.className = 'fs-tile' + (item.classList.contains('active') ? ' active' : '');
      tile.textContent = shortLabel;
      tile.title = title;
      tile.addEventListener('click', () => {
        item.click();
        container.querySelectorAll('.fs-tile').forEach(t => t.classList.remove('active'));
        tile.classList.add('active');
      });
      container.appendChild(tile);
    });
  }

  // ── Keyboard shortcuts ──
  document.addEventListener('keydown', (e) => {
    if (e.target === searchInput) return;
    if (e.key === 'ArrowLeft') navigatePage(-1);
    if (e.key === 'ArrowRight') navigatePage(1);
    if (e.key === '+' || e.key === '=') zoom(0.25);
    if (e.key === '-') zoom(-0.25);
    if (e.key === 'f' || e.key === 'F') toggleFullscreen();
  });

  // ── Wire up fullscreen search icon ──
  document.getElementById('fs-search-icon').addEventListener('click', () => {
    toggleFullscreen(false);
    searchInput.focus();
  });

  // ── Wire up search ──
  searchInput.addEventListener('input', () => {
    const q = searchInput.value;
    const results = searchSongs(q);
    renderResults(results, q);
  });

  // ── Init ──
  await loadCatalog();
  renderResults([], '');
</script>
</body>
</html>
